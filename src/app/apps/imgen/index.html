<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtForge AI — Advanced Image Generator</title>
    <meta name="description" content="Generate stunning AI images with advanced controls. Anime, realistic, fantasy and more styles powered by cutting-edge AI models.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated background particles -->
    <div class="bg-particles" id="bgParticles"></div>

    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 32 32" fill="none">
                        <defs>
                            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#a855f7"/>
                                <stop offset="100%" style="stop-color:#6366f1"/>
                            </linearGradient>
                        </defs>
                        <path d="M16 2L28 8V24L16 30L4 24V8L16 2Z" fill="url(#logoGrad)" opacity="0.2"/>
                        <path d="M16 2L28 8V24L16 30L4 24V8L16 2Z" stroke="url(#logoGrad)" stroke-width="1.5" fill="none"/>
                        <path d="M16 8L22 11V21L16 24L10 21V11L16 8Z" fill="url(#logoGrad)" opacity="0.5"/>
                        <circle cx="16" cy="16" r="3" fill="url(#logoGrad)"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <span class="logo-name">ArtForge</span>
                    <span class="logo-tag">AI</span>
                </div>
            </div>
            <div class="header-stats">
                <div class="stat-badge" id="generationCount">
                    <span class="stat-icon">🎨</span>
                    <span class="stat-value">0</span>
                    <span class="stat-label">Generated</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="app-layout">
            <!-- Left Panel: Controls -->
            <aside class="controls-panel">
                <div class="panel-header">
                    <h2 class="panel-title">
                        <span class="title-icon">⚙️</span>
                        Generation Settings
                    </h2>
                </div>

                <!-- Prompt Section -->
                <div class="control-section">
                    <div class="control-label-row">
                        <label for="promptInput" class="control-label">Description</label>
                        <div class="label-actions">
                            <button class="action-btn" id="randomizeBtn" title="Random prompt">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><circle cx="12" cy="12" r="1.5"/><circle cx="8" cy="9" r="1"/><circle cx="16" cy="9" r="1"/><circle cx="8" cy="15" r="1"/><circle cx="16" cy="15" r="1"/></svg>
                                <span>Randomize</span>
                            </button>
                            <button class="action-btn enhance-btn" id="enhanceBtn" title="Enhance prompt with AI">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
                                <span>Enhance</span>
                            </button>
                        </div>
                    </div>
                    <textarea id="promptInput" class="prompt-textarea" placeholder="Describe the image you want to generate...&#10;&#10;Example: A futuristic cyberpunk city at night, neon lights reflecting on wet streets, flying cars, highly detailed 8k render" rows="5"></textarea>
                </div>

                <!-- Negative Prompt -->
                <div class="control-section">
                    <div class="control-label-row">
                        <label for="negativePrompt" class="control-label">Anti-Description</label>
                        <button class="action-btn" id="toggleNegative" title="Toggle section">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                        </button>
                    </div>
                    <div class="collapsible" id="negativeSection">
                        <textarea id="negativePrompt" class="prompt-textarea small" placeholder="Things to avoid in the image..." rows="3">blurry, low quality, distorted, deformed, ugly, bad anatomy, bad proportions, watermark, text, signature</textarea>
                    </div>
                </div>

                <!-- Art Style -->
                <div class="control-section">
                    <label for="artStyle" class="control-label">Art Style</label>
                    <div class="select-wrapper">
                        <select id="artStyle" class="styled-select">
                            <option value="">None (Raw Prompt)</option>
                            <optgroup label="🎨 Anime & Manga">
                                <option value="anime style, detailed anime art, vibrant colors" selected>Anime</option>
                                <option value="chibi style, cute chibi character, kawaii">Chibi</option>
                                <option value="manga style, black and white manga, ink drawing">Manga</option>
                                <option value="90s anime style, retro anime, cel shading, VHS aesthetic">90s Retro Anime</option>
                                <option value="studio ghibli style, whimsical, soft colors, detailed background">Studio Ghibli</option>
                                <option value="shonen anime style, dynamic action pose, speed lines">Shonen</option>
                            </optgroup>
                            <optgroup label="🖼️ Artistic">
                                <option value="oil painting style, textured brushstrokes, rich colors">Oil Painting</option>
                                <option value="watercolor painting, soft washes, delicate, ethereal">Watercolor</option>
                                <option value="digital art, highly detailed, sharp, vibrant">Digital Art</option>
                                <option value="concept art, professional, cinematic, detailed">Concept Art</option>
                                <option value="pixel art, retro game style, 16-bit">Pixel Art</option>
                                <option value="art nouveau style, ornate, flowing lines, decorative">Art Nouveau</option>
                                <option value="impressionist painting, soft brushstrokes, light and color">Impressionist</option>
                                <option value="pop art style, bold colors, halftone dots, comic">Pop Art</option>
                            </optgroup>
                            <optgroup label="📸 Realistic">
                                <option value="photorealistic, ultra detailed, 8k, professional photography">Photorealistic</option>
                                <option value="cinematic photography, dramatic lighting, film grain, bokeh">Cinematic</option>
                                <option value="portrait photography, professional studio lighting, sharp focus">Portrait Photo</option>
                                <option value="macro photography, extreme close-up, shallow depth of field">Macro Photo</option>
                            </optgroup>
                            <optgroup label="✨ Fantasy & Sci-Fi">
                                <option value="dark fantasy art, gothic, atmospheric, moody lighting">Dark Fantasy</option>
                                <option value="high fantasy art, epic, magical, detailed">High Fantasy</option>
                                <option value="cyberpunk style, neon lights, futuristic, dark, rain">Cyberpunk</option>
                                <option value="steampunk style, brass, gears, Victorian, mechanical">Steampunk</option>
                                <option value="sci-fi concept art, futuristic, space, technology">Sci-Fi</option>
                                <option value="vaporwave aesthetic, pastel colors, retro-futuristic, glitch">Vaporwave</option>
                            </optgroup>
                            <optgroup label="🎭 Special">
                                <option value="isometric 3D style, clean, geometric, miniature">Isometric 3D</option>
                                <option value="line art, clean lines, minimalist, black and white">Line Art</option>
                                <option value="sticker design, cute, outlined, kawaii, flat colors">Sticker</option>
                                <option value="logo design, clean, professional, minimalist, vector">Logo Design</option>
                                <option value="comic book style, bold outlines, halftone, dynamic">Comic Book</option>
                            </optgroup>
                        </select>
                        <div class="select-icon">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                        </div>
                    </div>
                </div>

                <!-- AI Model -->
                <div class="control-section">
                    <label for="aiModel" class="control-label">AI Model</label>
                    <div class="select-wrapper">
                        <select id="aiModel" class="styled-select">
                            <option value="flux" selected>Flux (Recommended)</option>
                            <option value="flux-realism">Flux Realism</option>
                            <option value="flux-anime">Flux Anime</option>
                            <option value="flux-3d">Flux 3D</option>
                            <option value="flux-pro">Flux Pro</option>
                            <option value="turbo">Turbo (Fast)</option>
                            <option value="any-dark">Any Dark</option>
                        </select>
                        <div class="select-icon">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                        </div>
                    </div>
                </div>

                <!-- Image Shape -->
                <div class="control-section">
                    <label class="control-label">Image Shape</label>
                    <div class="shape-selector">
                        <button class="shape-btn" data-shape="long" data-width="768" data-height="1344" title="Long (768×1344)">
                            <div class="shape-preview long-shape"></div>
                            <span>Long</span>
                            <span class="shape-ratio">9:16</span>
                        </button>
                        <button class="shape-btn" data-shape="portrait" data-width="768" data-height="1152" title="Portrait (768×1152)">
                            <div class="shape-preview portrait-shape"></div>
                            <span>Portrait</span>
                            <span class="shape-ratio">2:3</span>
                        </button>
                        <button class="shape-btn active" data-shape="square" data-width="1024" data-height="1024" title="Square (1024×1024)">
                            <div class="shape-preview square-shape"></div>
                            <span>Square</span>
                            <span class="shape-ratio">1:1</span>
                        </button>
                        <button class="shape-btn" data-shape="landscape" data-width="1152" data-height="768" title="Landscape (1152×768)">
                            <div class="shape-preview landscape-shape"></div>
                            <span>Landscape</span>
                            <span class="shape-ratio">3:2</span>
                        </button>
                        <button class="shape-btn" data-shape="wide" data-width="1344" data-height="768" title="Widescreen (1344×768)">
                            <div class="shape-preview wide-shape"></div>
                            <span>Wide</span>
                            <span class="shape-ratio">16:9</span>
                        </button>
                        <button class="shape-btn" data-shape="custom" data-width="0" data-height="0" title="Custom dimensions" id="customShapeBtn">
                            <div class="shape-preview custom-shape">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4v14a2 2 0 002 2h14v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            </div>
                            <span>Custom</span>
                            <span class="shape-ratio">Any</span>
                        </button>
                    </div>

                    <!-- Custom Dimensions Panel -->
                    <div class="custom-dimensions-panel" id="customDimensionsPanel">
                        <div class="custom-dims-row">
                            <div class="custom-dim-field">
                                <label for="customWidth" class="dim-label">Width</label>
                                <div class="dim-input-wrap">
                                    <input type="number" id="customWidth" class="styled-input dim-input" value="1920" min="64" max="4096" step="64">
                                    <span class="dim-unit">px</span>
                                </div>
                            </div>
                            <button class="swap-dims-btn" id="swapDimsBtn" title="Swap width & height">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
                            </button>
                            <div class="custom-dim-field">
                                <label for="customHeight" class="dim-label">Height</label>
                                <div class="dim-input-wrap">
                                    <input type="number" id="customHeight" class="styled-input dim-input" value="1080" min="64" max="4096" step="64">
                                    <span class="dim-unit">px</span>
                                </div>
                            </div>
                        </div>
                        <div class="dim-preview-text" id="dimPreviewText">1920 × 1080 — 2.1 MP</div>
                        <div class="preset-chips">
                            <button class="preset-chip" data-w="1920" data-h="1080">FHD 1080p</button>
                            <button class="preset-chip" data-w="2560" data-h="1440">QHD 1440p</button>
                            <button class="preset-chip" data-w="3840" data-h="2160">4K UHD</button>
                            <button class="preset-chip" data-w="1080" data-h="1920">Mobile</button>
                            <button class="preset-chip" data-w="2048" data-h="2048">2K Square</button>
                            <button class="preset-chip" data-w="1500" data-h="500">Banner</button>
                        </div>
                    </div>
                </div>



                <!-- Seed -->
                <div class="control-section">
                    <div class="control-label-row">
                        <label for="seedInput" class="control-label">Seed</label>
                        <button class="action-btn" id="randomSeedBtn" title="Random seed">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><circle cx="12" cy="12" r="2"/></svg>
                            <span>Random</span>
                        </button>
                    </div>
                    <input type="number" id="seedInput" class="styled-input" value="-1" placeholder="Random (-1)">
                </div>

                <!-- Generate Button -->
                <button class="generate-btn" id="generateBtn">
                    <div class="btn-content">
                        <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
                        <span>Generate Images</span>
                    </div>
                    <div class="btn-loading" style="display:none;">
                        <div class="spinner"></div>
                        <span>Generating...</span>
                    </div>
                    <div class="btn-glow"></div>
                </button>

                <!-- Keyboard Shortcut Hint -->
                <div class="shortcut-hint">
                    Press <kbd>Ctrl</kbd> + <kbd>Enter</kbd> to generate
                </div>
            </aside>

            <!-- Right Panel: Gallery -->
            <section class="gallery-panel">
                <div class="panel-header">
                    <h2 class="panel-title">
                        <span class="title-icon">🖼️</span>
                        Generated Images
                    </h2>
                    <button class="action-btn" id="clearGalleryBtn" title="Clear gallery" style="display:none;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        <span>Clear All</span>
                    </button>
                </div>

                <!-- Empty State -->
                <div class="empty-state" id="emptyState">
                    <div class="empty-illustration">
                        <div class="empty-circle"></div>
                        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5" class="empty-icon">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <path d="M21 15l-5-5L5 21"/>
                        </svg>
                    </div>
                    <h3 class="empty-title">No Images Yet</h3>
                    <p class="empty-text">Enter a description and click Generate to create stunning AI art</p>
                </div>

                <!-- Gallery Grid -->
                <div class="gallery-grid" id="galleryGrid"></div>
            </section>
        </div>
    </main>

    <!-- Image Modal -->
    <div class="modal-overlay" id="imageModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
            <img id="modalImage" class="modal-image" src="" alt="Generated image">
            <div class="modal-info">
                <p class="modal-prompt" id="modalPrompt"></p>
                <div class="modal-actions">
                    <button class="modal-action-btn" id="modalDownload">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                        Download
                    </button>
                    <button class="modal-action-btn" id="modalCopyPrompt">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                        Copy Prompt
                    </button>
                    <button class="modal-action-btn" id="modalReuse">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
                        Reuse Settings
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="app.js?v=10"></script>
</body>
</html>
