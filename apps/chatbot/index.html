<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Chatbot | Multi-Model Interface</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="layout">
        <div id="sidebar-overlay" class="sidebar-overlay"></div>
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <button id="new-chat-btn" class="primary-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    New Chat
                </button>
            </div>
            <div id="chat-list" class="chat-list"></div>
            <div class="sidebar-footer">
                <button id="theme-toggle" class="nav-btn" title="Toggle Theme">
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <span id="theme-text">Dark Mode</span>
                </button>
            </div>
        </aside>

        <div class="app-container">
            <header>
                <div class="header-left">
                    <button id="mobile-menu-btn" class="icon-btn mobile-only" title="Open Menu">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                    <div class="model-selector-container">
                        <select id="model-selector" class="model-dropdown">
                            <optgroup label="🧠 Reasoning Models (OpenRouter)">
                                <option value="trinity-large">Trinity Large (Reasoning)</option>
                                <option value="trinity-mini">Trinity Mini (Reasoning)</option>
                                <option value="step-flash">Step 3.5 Flash (Reasoning)</option>
                                <option value="nemotron-3-nano">Nemotron 3 Nano 30B</option>
                                <option value="gpt-oss-120b">GPT OSS 120B</option>
                                <option value="gpt-oss-20b">GPT OSS 20B</option>
                            </optgroup>
                            <optgroup label="👁️ Vision Models (OpenRouter)">
                                <option value="nemotron-12b-vl">Nemotron Nano 12B VL</option>
                                <option value="gemma-3-27b">Gemma 3 27B IT</option>
                                <option value="gemma-3-12b">Gemma 3 12B IT</option>
                                <option value="gemma-3-4b">Gemma 3 4B IT</option>
                                <option value="mistral-small-24b">Mistral Small 3.1 24B</option>
                            </optgroup>
                            <optgroup label="💬 Text Models (OpenRouter)">
                                <option value="llama-3.3-70b">Llama 3.3 70B Instruct</option>
                                <option value="llama-3.2-3b">Llama 3.2 3B Instruct</option>
                                <option value="hermes-3-405b">Hermes 3 Llama 3.1 405B</option>
                                <option value="qwen-coder">Qwen 3 Coder</option>
                                <option value="qwen-next-80b">Qwen 3 Next 80B</option>
                                <option value="qwen-4b">Qwen 3 4B</option>
                                <option value="glm-4.5-air">GLM 4.5 Air</option>
                                <option value="nemotron-9b-v2">Nemotron Nano 9B v2</option>
                                <option value="lfm-thinking">Liquid LFM 2.5 1.2B Thinking</option>
                                <option value="lfm-instruct">Liquid LFM 2.5 1.2B Instruct</option>
                                <option value="dolphin-mistral">Dolphin Mistral 24B Venice</option>
                                <option value="gemma-3n-e4b">Gemma 3n e4b IT</option>
                                <option value="gemma-3n-e2b">Gemma 3n e2b IT</option>
                            </optgroup>
                            <optgroup label="🎨 Image Generation (Pixazo AI)">
                                <option value="pixazo-flux">Flux 1 Schnell (Pixazo)</option>
                                <option value="pixazo-sdxl">SDXL (Pixazo)</option>
                                <option value="pixazo-inpainting">Image Inpainting (Pixazo)</option>
                            </optgroup>
                            <optgroup label="⚙️ Embeddings (OpenRouter)">
                                <option value="nemotron-embed">Llama Nemotron Embed VL 1B</option>
                            </optgroup>
                        </select>
                        <div id="model-desc" class="model-desc">Text-only deep reasoning.</div>
                    </div>
                </div>
                
                <div class="header-right">
                    <button id="settings-btn" class="icon-btn" title="Image Generation Settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
                    <button id="export-btn" class="icon-btn" title="Export Chat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg></button>
                    <button id="delete-chat-btn" class="icon-btn danger-hover" title="Delete Chat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
                </div>
            </header>

            <main id="chat-box" class="chat-box">
                <div class="chat-scroll-container">
                    <div id="empty-state" class="empty-state">
                        <div class="glow-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
                        <h2>How can I help you?</h2>
                        <p>Select a model from the top. Use the gear icon ⚙️ to customize Pixazo AI Image settings.</p>
                    </div>
                </div>
            </main>

            <div class="input-area">
                <div class="input-container">
                    <div id="attachment-preview" class="attachment-preview hidden">
                        <img id="preview-img" src="" alt="Attachment">
                        <button id="remove-attachment" title="Remove image">&times;</button>
                    </div>
                    <div class="input-wrapper">
                        <input type="file" id="file-input" accept="image/*" hidden>
                        <button id="upload-btn" class="icon-btn upload-btn" title="Attach Image">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                        </button>
                        <textarea id="user-input" placeholder="Message AI..." rows="1"></textarea>
                        <button id="send-btn" class="send-btn" disabled title="Send message">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Image Settings Modal -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Pixazo Image Settings</h3>
                <button id="close-modal" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Resolution (WxH)</label>
                    <div class="flex-row">
                        <input type="number" id="img-width" value="1024" step="64">
                        <span>x</span>
                        <input type="number" id="img-height" value="1024" step="64">
                    </div>
                </div>
                <div class="form-group">
                    <label>Number of Steps (Flux=4, SDXL=20)</label>
                    <input type="number" id="img-steps" value="20" min="1" max="50">
                </div>
                <div class="form-group">
                    <label>Guidance Scale (SDXL/Inpaint only)</label>
                    <input type="number" id="img-guidance" value="5" step="0.5">
                </div>
                <div class="form-group">
                    <label>Seed (Random if blank)</label>
                    <input type="number" id="img-seed" value="42" placeholder="e.g. 42">
                </div>
                <div class="form-group">
                    <label>Negative Prompt (SDXL/Inpaint only)</label>
                    <textarea id="img-negative" rows="2" placeholder="Low-quality, blurry..."></textarea>
                </div>
                <div class="form-group">
                    <label>Mask Image URL (For Inpainting only)</label>
                    <input type="text" id="img-mask" placeholder="https://.../mask.png">
                    <small>For the base image, use the paperclip upload button.</small>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
